server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /receiver {
        proxy_pass http://receiver-service:8080;
    }

    location /storage {
        proxy_pass http://storage-service:8091;
    }

    location /processing {
        proxy_pass http://processing-service:8100;
    }

    location /analyzer {
        proxy_pass http://analyzer-service:5005;
    }

    location /healthcheck {
        proxy_pass http://health-check-service:8120;
    }
}